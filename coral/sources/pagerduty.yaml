name: pagerduty
display_name: PagerDuty
description: Incident and escalation data for CoralOps root-cause analysis.
version: 0.1.0
category: incident-management

auth:
  type: bearer
  header: Authorization
  format: "Token token={token}"
  fields:
    - name: token
      label: PagerDuty API token
      secret: true

base_url: https://api.pagerduty.com

tables:
  incidents:
    description: PagerDuty incidents with status, urgency, assignee, and service context.
    endpoint: /incidents
    method: GET
    params:
      include[]: services
      limit: 100
    columns:
      - name: id
        type: string
        path: id
      - name: title
        type: string
        path: title
      - name: status
        type: string
        path: status
      - name: urgency
        type: string
        path: urgency
      - name: created_at
        type: timestamp
        path: created_at
      - name: updated_at
        type: timestamp
        path: updated_at
      - name: service_id
        type: string
        path: service.id
      - name: service_name
        type: string
        path: service.summary
      - name: html_url
        type: string
        path: html_url

examples:
  - name: Triggered high-urgency incidents
    sql: |
      SELECT title, status, urgency, created_at
      FROM pagerduty.incidents
      WHERE status = 'triggered'
        AND urgency = 'high'
      ORDER BY created_at DESC
      LIMIT 20;
  - name: PagerDuty incidents after merged PRs
    sql: |
      SELECT p.title, p.urgency, g.title AS related_pr
      FROM pagerduty.incidents p
      JOIN github.pull_requests g
        ON p.created_at >= g.merged_at
        AND p.created_at <= g.merged_at + INTERVAL '2 hours'
      WHERE p.urgency = 'high'
      LIMIT 20;
